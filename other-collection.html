<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="90s Geek Collection Manager — browse and manage your non-LEGO building sets.">
    <link rel="icon" type="image/webp" href="images/90s_Geek_logo.webp">
    <title>Other Sets Collection</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css?v=10">
    <style>
        /* Magenta accent for Other Collection */
        h1 { color: var(--magenta); }
        h1::before { background: var(--magenta); box-shadow: 0 0 10px var(--magenta); }

        .export-btn { background: var(--magenta); }
        .export-btn:hover { background: #aa0080; }

        .add-item-btn {
            display: inline-block;
            margin: 0 0 18px 10px;
            padding: 8px 20px;
            background: transparent;
            color: var(--magenta);
            border: 1px solid var(--magenta);
            font-family: var(--mono);
            font-size: 0.78em;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: background 0.2s, color 0.2s;
        }
        .add-item-btn:hover { background: var(--magenta); color: #000; }

        .nav a.active {
            color: var(--magenta);
            border-bottom-color: var(--magenta);
        }
        .nav a.active::after { background: var(--magenta); transform: scaleX(1); }

        /* Add form styles */
        .add-form { display: flex; flex-direction: column; gap: 0; }
        .add-form-row { display: flex; flex-direction: column; margin-bottom: 12px; }
        .add-form-row label {
            font-family: var(--mono);
            font-size: 0.68em;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .add-required { color: var(--magenta); }
        .add-form-input {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            padding: 8px 10px;
            font-family: var(--mono);
            font-size: 0.88em;
            outline: none;
            transition: border-color 0.2s;
        }
        .add-form-input:focus { border-color: var(--magenta); }
        .add-form-textarea {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            padding: 8px 10px;
            font-family: var(--mono);
            font-size: 0.85em;
            outline: none;
            resize: vertical;
            min-height: 70px;
            transition: border-color 0.2s;
        }
        .add-form-textarea:focus { border-color: var(--magenta); }
        .add-submit-btn {
            width: 100%;
            margin-top: 6px;
            padding: 10px;
            background: var(--magenta);
            color: #000;
            border: none;
            font-family: var(--mono);
            font-size: 0.82em;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: background 0.2s;
        }
        .add-submit-btn:hover { background: #dd00aa; }
        .modal-box h2 { color: var(--magenta); }
        .modal-box { border-color: var(--magenta); box-shadow: 0 0 30px rgba(255,0,170,0.15); }
    </style>
</head>
<body data-page="other-collection">
    <div class="sidebar-panel"></div>
    <a href="index.html"><img src="images/90s_Geek_logo.webp" alt="90s Geek Logo" class="logo"></a>

    <div class="nav">
        <a href="index.html">SEARCH</a>
        <a href="collection.html">LEGO</a>
        <a href="wantlist.html">LEGO WANTS</a>
        <a href="other-collection.html">OTHER SETS</a>
        <a href="other-wantlist.html">OTHER WANTS</a>
        <a href="stats.html">STATS</a>
    </div>
    <div id="toast-container"></div>

    <h1>Other Sets Collection</h1>

    <button class="export-btn" onclick="exportItems()">DOWNLOAD CSV (EXCEL)</button>
    <button class="add-item-btn" onclick="openAddModal()">+ ADD SET</button>

    <div class="controls-panel">
        <div class="controls-panel-title" id="controls-toggle" onclick="toggleControls()" aria-expanded="true" aria-controls="controls-body" role="button" tabindex="0">
            > SORT &amp; FILTER <span class="controls-panel-toggle">▲</span>
        </div>
        <div class="controls-panel-body" id="controls-body">
            <div class="control-row">
                <label>Sort By:</label>
                <select id="sort-select" onchange="applyControls()">
                    <option value="created_at|desc">Date Added (Newest First)</option>
                    <option value="created_at|asc">Date Added (Oldest First)</option>
                    <option value="name|asc">Name (A → Z)</option>
                    <option value="name|desc">Name (Z → A)</option>
                    <option value="year|desc">Year (Newest First)</option>
                    <option value="year|asc">Year (Oldest First)</option>
                    <option value="brand|asc">Brand (A → Z)</option>
                    <option value="condition|asc">Condition (A → Z)</option>
                </select>
            </div>
            <div class="control-row">
                <label>Brand:</label>
                <select id="filter-brand" onchange="applyControls()">
                    <option value="">All Brands</option>
                </select>
            </div>
            <div class="control-row">
                <label>Year:</label>
                <select id="filter-year" onchange="applyControls()">
                    <option value="">All Years</option>
                </select>
            </div>
            <div class="control-row">
                <label>Condition:</label>
                <select id="filter-condition" onchange="applyControls()">
                    <option value="">All Conditions</option>
                </select>
            </div>
            <div class="control-row">
                <label>Search:</label>
                <input type="text" id="filter-name" placeholder="Type to search by name..." oninput="debouncedFilter()">
            </div>
            <button class="clear-filters-btn" onclick="clearFilters()">✕ CLEAR FILTERS</button>
        </div>
    </div>

    <div class="collection-meta-row">
        <div class="collection-count" id="collection-count"></div>
        <div class="view-toggle">
            <button id="btn-list" class="active" onclick="setView('list')" title="List view">☰</button>
            <button id="btn-grid" onclick="setView('grid')" title="Grid view">⊞</button>
        </div>
    </div>

    <ul id="collection-list">
        <li>Loading database...</li>
    </ul>

    <div class="modal-overlay" id="set-modal" onclick="closeModal(event)">
        <div class="modal-box" id="modal-content">
            <button class="modal-close" onclick="document.getElementById('set-modal').classList.remove('active')">✕</button>
        </div>
    </div>

    <button id="scroll-top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">▲</button>
    <script>
        (function() {
            var btn = document.getElementById('scroll-top-btn');
            window.addEventListener('scroll', function() {
                btn.classList.toggle('visible', window.scrollY > 400);
            }, { passive: true });
        })();
    </script>

    <script src="other-script.js?v=1"></script>
</body>
</html>
