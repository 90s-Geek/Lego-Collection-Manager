<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="90s Geek LEGO Collection Manager — search, track and manage your LEGO sets.">
    <link rel="icon" type="image/webp" href="images/90s_Geek_logo.webp">
    <title>90s Geek LEGO Search</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css?v=10">
    <style>
        .search-box {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: var(--radius);
            padding: 12px;
            margin-bottom: 24px;
            display: flex;
            gap: 10px;
            transition: border-color var(--transition), box-shadow var(--transition);
        }
        .search-box:focus-within {
            border-color: var(--green-dim);
            box-shadow: 0 0 0 3px var(--green-glow);
        }
        .search-box form { display: flex; flex-wrap: wrap; gap: 10px; width: 100%; }
        input {
            background: transparent;
            color: var(--text);
            border: none;
            outline: none;
            padding: 8px 10px;
            width: 250px;
            box-sizing: border-box;
            font-family: var(--mono);
            font-size: 0.9em;
            flex: 1;
        }
        input::placeholder { color: var(--text-muted); }

        /* ── Set of the Day — Hero Card ─────────────────────── */
        #sotd-section {
            margin-bottom: 24px;
            border: 1px solid var(--border2);
            background: var(--surface);
            border-radius: var(--radius-lg);
            position: relative;
            overflow: hidden;
        }
        #sotd-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--amber) 25%, #ffe88a 50%, var(--amber) 75%, transparent);
            animation: sotdScan 3s ease-in-out infinite;
        }
        @keyframes sotdScan { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .sotd-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px 10px;
            border-bottom: 1px solid var(--border);
        }
        .sotd-header-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--mono);
            font-size: 0.68em;
            font-weight: 700;
            color: var(--amber);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .sotd-header-label::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--amber);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--amber);
            animation: pulse 2s infinite;
            flex-shrink: 0;
        }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
        .sotd-header-label span { color: var(--text-muted); margin-left: 8px; font-size: 0.9em; font-weight: 400; letter-spacing: 1px; }

        .sotd-body {
            display: flex;
            gap: 0;
            align-items: stretch;
        }

        .sotd-img-panel {
            flex-shrink: 0;
            width: 220px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            border-right: 1px solid var(--border);
            transition: filter var(--transition);
            border-radius: 0 0 0 var(--radius-lg);
        }
        .sotd-img-panel:hover { filter: brightness(0.92); }
        .sotd-img-panel img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            display: block;
        }
        .sotd-badge {
            position: absolute;
            top: 8px; left: 8px;
            background: rgba(255,183,48,0.15);
            color: var(--amber);
            border: 1px solid rgba(255,183,48,0.4);
            font-family: var(--mono);
            font-size: 0.58em;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 3px 10px;
            text-transform: uppercase;
            border-radius: 50px;
        }
        .sotd-enlarge-hint {
            position: absolute;
            bottom: 6px; right: 8px;
            font-family: var(--mono);
            font-size: 0.55em;
            color: #888;
            letter-spacing: 0.5px;
            background: rgba(0,0,0,0.4);
            padding: 2px 6px;
            pointer-events: none;
            border-radius: 4px;
        }

        .sotd-info-panel {
            flex: 1;
            min-width: 0;
            padding: 20px 22px 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 14px;
        }
        .sotd-name {
            font-family: var(--sans);
            color: #fff;
            font-size: 1.25em;
            font-weight: 700;
            line-height: 1.3;
            word-break: break-word;
        }
        .sotd-meta-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .sotd-meta-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .sotd-meta-val {
            font-family: var(--mono);
            color: var(--amber);
            font-size: 1.1em;
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1;
        }
        .sotd-meta-lbl {
            font-family: var(--mono);
            color: var(--text-muted);
            font-size: 0.58em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .sotd-meta-divider {
            width: 1px;
            background: var(--border2);
            align-self: stretch;
            margin: 2px 0;
        }
        .sotd-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .sotd-btn {
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--text-dim);
            padding: 8px 16px;
            font-family: var(--mono);
            font-size: 0.74em;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            white-space: nowrap;
            border-radius: var(--radius-sm);
            transition: all var(--transition);
            text-transform: uppercase;
        }
        .sotd-btn:hover { border-color: var(--amber); color: var(--amber); background: rgba(255,183,48,0.06); box-shadow: none; transform: none; }
        .sotd-btn.primary {
            background: var(--amber);
            color: #000;
            border-color: var(--amber);
        }
        .sotd-btn.primary:hover { background: #ffc85c; border-color: #ffc85c; box-shadow: 0 0 14px rgba(255,183,48,0.35); transform: translateY(-1px); }

        /* ── Search results ─────────────────────────────────── */
        #result-container { display: none; background: var(--surface); border: 1px solid var(--border2); border-top: 2px solid var(--cyan); border-radius: var(--radius-lg); padding: 20px; text-align: center; }
        #result-container h2 { color: var(--cyan); margin-top: 0; text-transform: uppercase; }
        .set-meta { font-family: var(--mono); color: var(--text-dim); margin-bottom: 15px; font-size: 0.88em; border-bottom: 1px solid var(--border2); padding-bottom: 10px; }
        .set-meta strong { color: var(--cyan); }
        .save-btn { background: var(--magenta); color: #000; margin-top: 15px; padding: 10px 18px; flex: 1; min-width: 140px; border-radius: var(--radius-sm); }
        .save-btn:hover { background: #e040e0; }
        .wantlist-btn { background: var(--amber); color: #000; margin-top: 15px; padding: 10px 18px; flex: 1; min-width: 140px; font-weight: 700; border-radius: var(--radius-sm); }
        .wantlist-btn:hover { background: #e0a028; }
        .search-results-list { list-style: none; padding: 0; margin: 0; text-align: left; max-height: 480px; overflow-y: auto; }
        .search-result-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background var(--transition); border-radius: 0; }
        .search-result-item:hover { background: var(--surface2); }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-info { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
        .search-result-info strong { color: #fff; font-size: 0.9em; word-break: break-word; font-family: var(--sans); }
        .search-result-meta { font-family: var(--mono); color: var(--text-muted); font-size: 0.7em; }

        @media (max-width: 600px) {
            .sotd-body { flex-direction: column; }
            .sotd-img-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); border-radius: 0; }
            .sotd-img-panel img { height: 160px; }
            input { width: 100%; }
            button[type="submit"] { width: 100%; }
            .search-box form { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="sidebar-panel"></div>
    <div class="right-panel"></div>
    <a href="index.html"><img src="images/90s_Geek_logo.webp" alt="90s Geek Logo" class="logo"></a>

    <div class="recently-added-panel">
        <span class="recently-added-title">RECENTLY ADDED</span>
        <div id="last-added-container">
            <div style="color:#333;font-size:0.65em;letter-spacing:1px;padding:4px 2px;">LOADING...</div>
        </div>
    </div>

    <div class="nav">
        <a href="collection.html">LEGO</a>
        <a href="wantlist.html">LEGO WANTS</a>
        <a href="other-collection.html">OTHER SETS</a>
        <a href="other-wantlist.html">OTHER WANTS</a>
        <a href="stats.html">STATS</a>
    </div>
    <div id="toast-container"></div>

    <h1>LEGO Search</h1>

    <div class="search-box">
        <form onsubmit="event.preventDefault(); searchLego();">
            <input type="text" id="set-input" placeholder="Set #, name, or theme (e.g. 6080, Castle, Star Wars)">
            <button type="submit">SEARCH</button>
        </form>
    </div>

    <!-- Set of the Day -->
    <div id="sotd-section">
        <div class="sotd-header">
            <span class="sotd-header-label">⚄ Set of the Day <span id="sotd-date"></span></span>
        </div>
        <div id="sotd-container">
            <div style="padding:30px 20px;color:#333;font-size:0.8em;letter-spacing:2px;">LOADING...</div>
        </div>
    </div>

    <div id="result-container"></div>

    <nav class="quick-links"></nav>

    <script src="script.js?v=9"></script>
</body>
</html>
