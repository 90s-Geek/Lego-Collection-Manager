<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="90s Geek Collection Manager — browse and manage your non-LEGO want list.">
    <link rel="icon" type="image/webp" href="images/90s_Geek_logo.webp">
    <title>Other Sets Want List</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css?v=10">
    <style>
        /* Purple accent for Other Want List */
        h1 { color: #cc88ff; }
        h1::before { background: #cc88ff; box-shadow: 0 0 10px #cc88ff; }

        .export-btn { background: #cc88ff; color: #000; }
        .export-btn:hover { background: #aa66dd; }

        .add-item-btn {
            display: inline-block;
            margin: 0 0 18px 10px;
            padding: 8px 20px;
            background: transparent;
            color: #cc88ff;
            border: 1px solid #cc88ff;
            font-family: var(--mono);
            font-size: 0.78em;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: background 0.2s, color 0.2s;
        }
        .add-item-btn:hover { background: #cc88ff; color: #000; }

        /* Purple nav active override */
        .nav a.active {
            color: #cc88ff;
            border-bottom-color: #cc88ff;
        }
        .nav a.active::after { background: #cc88ff; transform: scaleX(1); }
        .nav a:hover {
            color: #cc88ff;
        }

        /* Controls purple overrides */
        .controls-panel { border-color: #330055; background: #1a0030; }
        .controls-panel-title { color: #660099; }
        .control-row label { color: #cc88ff; }
        .control-row select,
        .control-row input[type="text"] { color: #cc88ff; border-color: #cc88ff; }
        .control-row input[type="text"]::placeholder { color: #442255; }
        .control-row select:focus,
        .control-row input[type="text"]:focus { border-color: #fff; color: #fff; }
        .control-row select option { color: #cc88ff; }
        .collection-count span { color: #cc88ff; }
        .view-toggle button.active { border-color: #cc88ff; color: #cc88ff; background: #200040; }

        .collection-item { border-color: #330055; background: #1a0030; }
        .collection-item:hover { background: #220044; border-color: #440066; }

        .modal-box { border-color: #cc88ff; box-shadow: 0 0 30px rgba(204,136,255,0.15); }
        .modal-box h2 { color: #cc88ff; }
        .modal-meta .value { color: #cc88ff; }

        /* Add form styles */
        .add-form { display: flex; flex-direction: column; gap: 0; }
        .add-form-row { display: flex; flex-direction: column; margin-bottom: 12px; }
        .add-form-row label {
            font-family: var(--mono);
            font-size: 0.68em;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .add-required { color: #cc88ff; }
        .add-form-input {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            padding: 8px 10px;
            font-family: var(--mono);
            font-size: 0.88em;
            outline: none;
            transition: border-color 0.2s;
        }
        .add-form-input:focus { border-color: #cc88ff; }
        .add-form-textarea {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            padding: 8px 10px;
            font-family: var(--mono);
            font-size: 0.85em;
            outline: none;
            resize: vertical;
            min-height: 70px;
            transition: border-color 0.2s;
        }
        .add-form-textarea:focus { border-color: #cc88ff; }
        .add-submit-btn {
            width: 100%;
            margin-top: 6px;
            padding: 10px;
            background: #cc88ff;
            color: #000;
            border: none;
            font-family: var(--mono);
            font-size: 0.82em;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: background 0.2s;
        }
        .add-submit-btn:hover { background: #aa66dd; }
    </style>
</head>
<body data-page="other-wantlist">
    <div class="sidebar-panel"></div>
    <a href="index.html"><img src="images/90s_Geek_logo.webp" alt="90s Geek Logo" class="logo"></a>

    <div class="nav">
        <a href="index.html">SEARCH</a>
        <a href="collection.html">LEGO</a>
        <a href="wantlist.html">LEGO WANTS</a>
        <a href="other-collection.html">OTHER SETS</a>
        <a href="other-wantlist.html">OTHER WANTS</a>
        <a href="stats.html">STATS</a>
    </div>
    <div id="toast-container"></div>

    <h1>Other Sets Want List</h1>

    <button class="export-btn" onclick="exportItems()">DOWNLOAD CSV (EXCEL)</button>
    <button class="add-item-btn" onclick="openAddModal()">+ ADD SET</button>

    <div class="controls-panel">
        <div class="controls-panel-title" id="controls-toggle" onclick="toggleControls()" aria-expanded="true" aria-controls="controls-body" role="button" tabindex="0">
            > SORT &amp; FILTER <span class="controls-panel-toggle">▲</span>
        </div>
        <div class="controls-panel-body" id="controls-body">
            <div class="control-row">
                <label>Sort By:</label>
                <select id="sort-select" onchange="applyControls()">
                    <option value="created_at|desc">Date Added (Newest First)</option>
                    <option value="created_at|asc">Date Added (Oldest First)</option>
                    <option value="name|asc">Name (A → Z)</option>
                    <option value="name|desc">Name (Z → A)</option>
                    <option value="year|desc">Year (Newest First)</option>
                    <option value="year|asc">Year (Oldest First)</option>
                    <option value="brand|asc">Brand (A → Z)</option>
                </select>
            </div>
            <div class="control-row">
                <label>Brand:</label>
                <select id="filter-brand" onchange="applyControls()">
                    <option value="">All Brands</option>
                </select>
            </div>
            <div class="control-row">
                <label>Year:</label>
                <select id="filter-year" onchange="applyControls()">
                    <option value="">All Years</option>
                </select>
            </div>
            <div class="control-row">
                <label>Search:</label>
                <input type="text" id="filter-name" placeholder="Type to search by name..." oninput="debouncedFilter()">
            </div>
            <button class="clear-filters-btn" onclick="clearFilters()">✕ CLEAR FILTERS</button>
        </div>
    </div>

    <div class="collection-meta-row">
        <div class="collection-count" id="collection-count"></div>
        <div class="view-toggle">
            <button id="btn-list" class="active" onclick="setView('list')" title="List view">☰</button>
            <button id="btn-grid" onclick="setView('grid')" title="Grid view">⊞</button>
        </div>
    </div>

    <ul id="collection-list">
        <li>Loading want list...</li>
    </ul>

    <div class="modal-overlay" id="set-modal" onclick="closeModal(event)">
        <div class="modal-box" id="modal-content">
            <button class="modal-close" onclick="document.getElementById('set-modal').classList.remove('active')">✕</button>
        </div>
    </div>

    <button id="scroll-top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">▲</button>
    <script>
        (function() {
            var btn = document.getElementById('scroll-top-btn');
            window.addEventListener('scroll', function() {
                btn.classList.toggle('visible', window.scrollY > 400);
            }, { passive: true });
        })();
    </script>

    <script src="other-script.js?v=1"></script>
</body>
</html>
